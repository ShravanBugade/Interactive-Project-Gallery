 <!DOCTYPE html>
<html>
<head>
<title>Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.container{
    display:flex;
    min-height:100vh;
}

.sidebar{
    width:220px;
    background:#1e293b;
    color:white;
    padding:20px;
}

.sidebar ul{
    list-style:none;
}

.sidebar li{
    padding:15px;
    cursor:pointer;
}

.main{
    flex:1;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
}

.chart-section{
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    height:450px;
}

.controls{
    margin:20px 0;
    display:flex;
    gap:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

.dark{
    background:#0f172a;
    color:white;
}

.dark .card,
.dark .chart-section{
    background:#1e293b;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Analytics</h2>
<ul>
<li>Website</li>
<li>App</li>
<li>E-Commerce</li>
<li>Health</li>
<li>Sports</li>
</ul>
</div>

<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
<button onclick="toggleTheme()">🌙 Theme</button>
</div>

<div class="cards">
<div class="card">
<h3>Users</h3>
<p id="users">0</p>
</div>

<div class="card">
<h3>Posts</h3>
<p id="posts">0</p>
</div>

<div class="card">
<h3>Comments</h3>
<p id="comments">0</p>
</div>

<div class="card">
<h3>Growth</h3>
<p>+12%</p>
</div>
</div>

<div class="controls">

<select id="analyticsType">
<option value="website">Website</option>
<option value="app">App</option>
<option value="ecommerce">E-Commerce</option>
<option value="health">Health</option>
<option value="sports">Sports</option>
</select>

<select id="chartType">
<option value="line">Line</option>
<option value="bar">Bar</option>
<option value="pie">Pie</option>
<option value="doughnut">Doughnut</option>
</select>

<button onclick="updateChart()">Update</button>

</div>

<div class="chart-section">
<canvas id="chart"></canvas>
</div>

<div class="chart-section">
<h2>User Table</h2>
<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>
</div>

<script>

let chart;

const analyticsData = {

website:[1200,1400,1600,1800,2200],
app:[500,700,900,850,1000],
ecommerce:[10000,12000,15000,17000,21000],
health:[7000,8500,10000,9500,12000],
sports:[2,4,5,3,7]

};

const labels=["Jan","Feb","Mar","Apr","May"];

async function loadData(){

const users =
await fetch(
'https://jsonplaceholder.typicode.com/users'
).then(r=>r.json());

const posts =
await fetch(
'https://jsonplaceholder.typicode.com/posts'
).then(r=>r.json());

const comments =
await fetch(
'https://jsonplaceholder.typicode.com/comments'
).then(r=>r.json());

document.getElementById('users').innerText=
users.length;

document.getElementById('posts').innerText=
posts.length;

document.getElementById('comments').innerText=
comments.length;

users.forEach(u=>{

document.getElementById('tbody').innerHTML+=`
<tr>
<td>${u.name}</td>
<td>${u.email}</td>
</tr>
`;

});

createChart('line','website');

}

function createChart(type,dataKey){

if(chart) chart.destroy();

chart = new Chart(
document.getElementById('chart'),
{
type:type,
data:{
labels:labels,
datasets:[{
label:dataKey,
data:analyticsData[dataKey]
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
}
);

}

function updateChart(){

const type =
document.getElementById('chartType').value;

const analytics =
document.getElementById('analyticsType').value;

createChart(type,analytics);

}

function toggleTheme(){
document.body.classList.toggle('dark');
}

loadData();

</script>

</body>
</html>
