<!DOCTYPE html>
<html>

<head>
  <title>Pending List</title>
</head>

<body>

  <div id="container"></div>

  <script>
    const MAX_RETRY = 3;

    // --------------------
    // STATE (per CIF)
    // --------------------
    let state = {
      retryMap: {},
      loadingMap: {}
    };

    // --------------------
    // SAMPLE DATA
    // --------------------
    const tableData = [
      { cif: "CIF001", acc: "A1", channel: "WEB", reason: "Update", date: "2026-01-01" },
      { cif: "CIF002", acc: "A2", channel: "APP", reason: "Fix", date: "2026-01-02" },
      { cif: "CIF003", acc: "A3", channel: "WEB", reason: "Change", date: "2026-01-03" }
    ];

    // --------------------
    // RENDER TABLE
    // --------------------
    function renderTable() {

      const container = document.getElementById("container");

      container.innerHTML = `
        <table border="1" cellpadding="10">
          <thead>
            <tr>
              <th>CIF</th>
              <th>ACC</th>
              <th>Channel</th>
              <th>Reason</th>
              <th>Date</th>
              <th>Status</th>
            </tr>
          </thead>

          <tbody>
            ${tableData.map(row => `
              <tr>

                <td>
                  <a
                    href="#"
                    id="link-${row.cif}"
                    onclick="onCifClick('${row.cif}'); return false;"
                  >
                    ${row.cif}
                  </a>
                </td>

                <td>${row.acc}</td>
                <td>${row.channel}</td>
                <td>${row.reason}</td>
                <td>${row.date}</td>

                <td id="status-${row.cif}"></td>

              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    // --------------------
    // CLICK HANDLER
    // --------------------
    async function onCifClick(cif) {

      // Prevent double click
      if (state.loadingMap[cif]) {
        console.log("Already loading:", cif);
        return;
      }

      if (!state.retryMap[cif]) {
        state.retryMap[cif] = 0;
      }

      // Start loading
      state.loadingMap[cif] = true;

      disableLink(cif);

      try {
        await callApi(cif);
      } finally {

        // API completed
        state.loadingMap[cif] = false;

        enableLink(cif);
      }
    }

    // --------------------
    // API CALL
    // --------------------
    async function callApi(cif) {

      showLoading(cif);

      try {

        // REAL API
        const res = await fetch(
          `http://localhost:3000/api/pending-list?cif=${cif}`
        );

        if (!res.ok) {
          throw new Error("HTTP Error " + res.status);
        }

        const result = await res.json();

        console.log("API:", result);

        handleResponse(result, cif);

      } catch (err) {

        console.warn("API failed, using MOCK →", err.message);

        // MOCK FALLBACK
        const mock = {
          CIF001: {
            status: "SUCCESS",
            data: {
              name: "User A",
              cif
            }
          },

          CIF002: {
            status: "EMPTY"
          },

          CIF003: {
            status: "FAILURE",
            error: "Server down"
          }
        };

        const result = mock[cif];

        handleResponse(result, cif);
      }
    }

    // --------------------
    // HANDLE RESPONSE
    // --------------------
    function handleResponse(result, cif) {

      if (!result) {
        showError(cif, "No response");
        return;
      }

      // SUCCESS
      if (result.status === "SUCCESS") {

        if (!isValidData(result.data)) {
          showEmpty(cif);
          return;
        }

        sessionStorage.setItem(
          `data-${cif}`,
          JSON.stringify(result.data)
        );

        redirect(cif);
        return;
      }

      // EMPTY
      if (result.status === "EMPTY") {
        showEmpty(cif);
        return;
      }

      // FAILURE
      state.retryMap[cif]++;

      if (state.retryMap[cif] < MAX_RETRY) {

        showError(
          cif,
          result.error || "Failed"
        );

      } else {

        showFatal(
          cif,
          result.error || "Failed"
        );
      }
    }

    // --------------------
    // VALIDATION
    // --------------------
    function isValidData(data) {

      return (
        data &&
        typeof data === "object" &&
        Object.keys(data).length > 0
      );
    }

    // --------------------
    // RETRY
    // --------------------
    function retry(cif) {
      onCifClick(cif);
    }

    // --------------------
    // LINK CONTROL
    // --------------------
    function disableLink(cif) {

      const link =
        document.getElementById(`link-${cif}`);

      if (link) {
        link.style.pointerEvents = "none";
        link.style.color = "gray";
      }
    }

    function enableLink(cif) {

      const link =
        document.getElementById(`link-${cif}`);

      if (link) {
        link.style.pointerEvents = "auto";
        link.style.color = "blue";
      }
    }

    // --------------------
    // UI STATES
    // --------------------
    function getEl(cif) {
      return document.getElementById(`status-${cif}`);
    }

    function showLoading(cif) {

      const el = getEl(cif);

      if (el) {
        el.innerHTML = "Loading...";
      }
    }

    function showEmpty(cif) {

      const el = getEl(cif);

      if (el) {
        el.innerHTML = `
          No Data
          <br/>
          <button onclick="retry('${cif}')">
            Retry
          </button>
        `;
      }
    }

    function showError(cif, msg) {

      const el = getEl(cif);

      const count = state.retryMap[cif];

      if (el) {
        el.innerHTML = `
          <span style="color:red;">
            ${msg}
          </span>

          <br/>

          <button onclick="retry('${cif}')">
            Retry (${count}/${MAX_RETRY})
          </button>
        `;
      }
    }

    function showFatal(cif, msg) {

      const el = getEl(cif);

      if (el) {
        el.innerHTML = `
          <span style="color:red;">
            Max Retry Failed
          </span>

          <br/>

          ${msg}

          <br/>

          <button onclick="resetRow('${cif}')">
            Reset
          </button>
        `;
      }
    }

    // --------------------
    // RESET
    // --------------------
    function resetRow(cif) {

      state.retryMap[cif] = 0;

      const el = getEl(cif);

      if (el) {
        el.innerHTML = "";
      }
    }

    // --------------------
    // REDIRECT
    // --------------------
    function redirect(cif) {

      window.location.href =
        `details.html?cif=${cif}`;
    }

    // INIT
    renderTable();

  </script>

</body>

</html>
